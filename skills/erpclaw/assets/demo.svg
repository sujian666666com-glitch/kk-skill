<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 470" width="760" height="470" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" role="img" aria-label="ERPClaw natural-language demo: add a customer, invoice them, record payment, show P and L by department">
  <!--
    Animated terminal demo for the ERPClaw README.
    GitHub renders animated SVG through the <img> tag and runs SMIL <animate>,
    but strips <script> and external fonts. Animation here is pure SMIL: each
    conversation line fades in on its own begin offset, then the whole 24s
    timeline restarts (repeatCount="indefinite"). No scripts, no external fonts.
  -->
  <defs>
    <style>
      text { font-size: 16px; }
      .prompt { fill: #14b8a6; }
      .user   { fill: #e2e8f0; }
      .ok     { fill: #34d399; }
      .dim    { fill: #94a3b8; }
      .amt    { fill: #fcd34d; }
      .head   { fill: #5eead4; }
    </style>
  </defs>

  <!-- Terminal frame -->
  <rect x="0" y="0" width="760" height="470" rx="12" fill="#0b1220"/>
  <rect x="0" y="0" width="760" height="38" rx="12" fill="#111c2e"/>
  <rect x="0" y="26" width="760" height="12" fill="#111c2e"/>
  <circle cx="22" cy="19" r="6" fill="#ef4444"/>
  <circle cx="44" cy="19" r="6" fill="#f59e0b"/>
  <circle cx="66" cy="19" r="6" fill="#22c55e"/>
  <text x="380" y="24" text-anchor="middle" class="dim" font-size="13">erpclaw — chat with your books</text>

  <!-- Conversation. Each group starts hidden (opacity 0) and fades in via SMIL. -->
  <g transform="translate(24, 74)">

    <!-- 1. Add customer -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.02;0.05;0.97;1" dur="24s" repeatCount="indefinite"/>
      <text><tspan class="prompt">you &#9656; </tspan><tspan class="user">Add customer Wayne Industries</tspan></text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.05;0.08;0.97;1" dur="24s" repeatCount="indefinite"/>
      <text y="28"><tspan class="ok">  &#10003; </tspan><tspan class="dim">customer created &#183; Wayne Industries</tspan></text>
    </g>

    <!-- 2. Invoice -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.13;0.16;0.97;1" dur="24s" repeatCount="indefinite"/>
      <text y="64"><tspan class="prompt">you &#9656; </tspan><tspan class="user">Invoice them for 10 widgets at $100</tspan></text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.16;0.19;0.97;1" dur="24s" repeatCount="indefinite"/>
      <text y="92"><tspan class="ok">  &#10003; </tspan><tspan class="dim">INV-2026-0042 &#183; </tspan><tspan class="amt">$1,000.00</tspan></text>
      <text y="114"><tspan class="dim">    Dr Accounts Receivable 1,000  &#183;  Cr Sales 1,000  &#183;  books balanced</tspan></text>
    </g>

    <!-- 3. Payment -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.27;0.30;0.97;1" dur="24s" repeatCount="indefinite"/>
      <text y="150"><tspan class="prompt">you &#9656; </tspan><tspan class="user">Record their payment</tspan></text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.30;0.33;0.97;1" dur="24s" repeatCount="indefinite"/>
      <text y="178"><tspan class="ok">  &#10003; </tspan><tspan class="dim">PAY-2026-0042 &#183; </tspan><tspan class="amt">$1,000.00</tspan><tspan class="dim"> &#183; paid in full</tspan></text>
      <text y="200"><tspan class="dim">    Dr Cash 1,000  &#183;  Cr Accounts Receivable 1,000  &#183;  AR cleared</tspan></text>
    </g>

    <!-- 4. P&L by department -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.41;0.44;0.97;1" dur="24s" repeatCount="indefinite"/>
      <text y="236"><tspan class="prompt">you &#9656; </tspan><tspan class="user">Show P&amp;L by department</tspan></text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.46;0.49;0.97;1" dur="24s" repeatCount="indefinite"/>
      <text y="266"><tspan class="head">  Department         Revenue          Net</tspan></text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.50;0.53;0.97;1" dur="24s" repeatCount="indefinite"/>
      <text y="290"><tspan class="dim">  Sales           </tspan><tspan class="amt">$1,000.00</tspan><tspan class="dim">      </tspan><tspan class="ok">$420.00</tspan></text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.54;0.57;0.97;1" dur="24s" repeatCount="indefinite"/>
      <text y="312"><tspan class="dim">  Services        </tspan><tspan class="amt">$  640.00</tspan><tspan class="dim">      </tspan><tspan class="ok">$310.00</tspan></text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.58;0.61;0.97;1" dur="24s" repeatCount="indefinite"/>
      <text y="334"><tspan class="dim">  Support         </tspan><tspan class="amt">$  180.00</tspan><tspan class="dim">      </tspan><tspan class="ok">$ 90.00</tspan></text>
    </g>

    <!-- Footer reassurance + blinking prompt cursor -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.66;0.69;0.97;1" dur="24s" repeatCount="indefinite"/>
      <text y="372"><tspan class="ok">  &#10003; </tspan><tspan class="dim">immutable GL &#183; Decimal precision &#183; every entry validated</tspan></text>
    </g>
    <g transform="translate(0, 400)">
      <text><tspan class="prompt">you &#9656; </tspan></text>
      <rect x="44" y="-13" width="10" height="18" fill="#14b8a6">
        <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>
</svg>
